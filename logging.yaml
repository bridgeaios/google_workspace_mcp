# =============================================================================
# Google Workspace MCP Server - Logging Configuration
# =============================================================================

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  
  detailed:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(pathname)s:%(lineno)d - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  
  json:
    class: core.log_formatter.JSONFormatter
    format: "%(timestamp)s %(level)s %(name)s %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  
  console_debug:
    class: logging.StreamHandler
    level: DEBUG
    formatter: detailed
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/workspace-mcp.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8
  
  file_debug:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/workspace-mcp-debug.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

loggers:
  # Google Workspace MCP Server
  google_workspace_mcp:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  # OAuth 2.1 Authentication
  auth:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  auth.oauth21:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  # Tool Modules
  gmail:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  gdrive:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  gcalendar:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  gdocs:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  gsheets:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  gchat:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  gforms:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  gslides:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  gtasks:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  gcontacts:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  gsearch:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  gappsscript:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  # Third-party libraries
  uvicorn:
    level: INFO
    handlers: [console]
    propagate: false
  
  fastapi:
    level: INFO
    handlers: [console]
    propagate: false
  
  googleapiclient:
    level: WARNING
    handlers: [console]
    propagate: false
  
  google_auth:
    level: WARNING
    handlers: [console]
    propagate: false

root:
  level: INFO
  handlers: [console]
